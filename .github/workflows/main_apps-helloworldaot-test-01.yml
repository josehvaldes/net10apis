# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - apps-helloworldaot-test-01

on:
  push:
    branches:
      - main
    paths:
      - 'HelloWorldApi/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: helloworldaot
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ./HelloWorldApi/HelloWorldApi/HelloWorldApi.csproj
        
      - name: Build with dotnet
        run: dotnet build ./HelloWorldApi/HelloWorldApi/HelloWorldApi.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ./HelloWorldApi/HelloWorldApi/HelloWorldApi.csproj -c Release -o ./publish
  
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6CCDCFA6655745A4A2015FAA34BCF11A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_70F38CBDF5F145E48E0D956894E0593A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_19EACED4772245A48BDD0554F9C31524 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'apps-helloworldaot-test-01'
          slot-name: 'Production'
          package: ./publish
          