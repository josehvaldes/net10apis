name: Rollback AWS Serverless API

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Lambda version number to roll back :live alias to'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Point :live alias to previous version
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name stack-minapi-calculator \
            --logical-resource-id AspNetCoreFunction \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text)

          aws lambda update-alias \
            --function-name "$FUNCTION_NAME" \
            --name live \
            --function-version "${{ github.event.inputs.version }}"